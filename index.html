<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Creator</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="left-dock" aria-label="Actions">
    <button id="saveBtn" class="dock-button" type="button" title="Save points">
      Save points
    </button>
    <button id="removePointBtn" class="dock-button dock-button--danger" type="button" title="Delete last point">
      Delete last point
    </button>
  </div>
  <div class="point-counter">
    <span id="pointCount">Points: 0</span>
  </div>
  <div id="saveStatus" class="save-status" aria-live="polite"></div>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="./config.js"></script>
  <script src="./app/point.js"></script>
  <script src="./app/save.js"></script>
  <script src="./app/app.js"></script>
</body>
</html>
