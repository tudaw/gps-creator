<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPS Creator</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  >
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  >
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="left-dock" aria-label="Actions">
    <button id="homeBtn" class="dock-button dock-button--icon" type="button" title="Go to configured map center" aria-label="Go to configured map center">
      <i class="fa fa-home" aria-hidden="true"></i>
    </button>
    <button id="saveBtn" class="dock-button" type="button" title="Save points">
      <i class="fa fa-save" aria-hidden="true"></i>
    </button>
    <button id="removePointBtn" class="dock-button dock-button--danger" type="button" title="Delete last point">
      <i class="fa fa-trash" aria-hidden="true"></i>
    </button>
  </div>
  <div class="point-counter">
    <span id="pointCount">Points: 0</span>
  </div>
  <div class="coordinate-input" aria-label="Coordinate input">
    <input
      id="latLonInput"
      class="coordinate-input__field"
      type="text"
      inputmode="decimal"
      placeholder="Latitude, Longitude"
      aria-label="Latitude and longitude"
    >
    <button id="addCoordBtn" class="coordinate-input__button" type="button">
      Add
    </button>
  </div>
  <div id="saveStatus" class="save-status" aria-live="polite"></div>
  <div id="map"></div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="./config.js"></script>
  <script src="./app/point.js"></script>
  <script src="./app/save.js"></script>
  <script src="./app/app.js"></script>
</body>
</html>
